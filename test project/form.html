<!DOCTYPE html>
<html lang="en">
<head>
    <title>gform</title>
    <link rel="stylesheet" href="formstyle.css">
</head>
<header>
    <h1>GFORM</h1>
</header>
<body>
    <pre>           </pre><br>
    <center>
    <form>
    <table>
        <tr>
            <td>NAME</td>
            <td><input type="text"></td>
        </tr>
        <tr>
            <td>AGE</td>
            <td><input type="number"></td>
        </tr>
        <tr>
            <td>YEAR</td>
            <td>
                <select>
                    <option> </option>
                    <option>I</option>
                    <option>II</option>
                    <option>III</option>
                    <option>IV</option>
                </select>
            </td>

        </tr>
        <tr>
            <td>DEPT</td>
            <td>
                <select>
                    <option> </option>
                    <option>AIDS</option>
                    <option>CSE</option>
                    <option>AIML</option>
                    <option>IT</option>
                    <option>ECE</option>
                    <option>EEE</option>
                    <option>ME</option>
                    <option>BT</option>
                </select>
            </td>
        </tr>
        <tr>
            <td>EMAIL</td>
            <td><input type="email"></td>
        </tr>
        <tr>
            <td>ROLL NO</td>
            <td><input type="number"></td>
        </tr>
        <tr>
            <td>CONTACT</td>
            <td><input type="number"></td>
        </tr>
    </table>
    <input type="submit">
    </form>
    </center>
</body>
</html>
